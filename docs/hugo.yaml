baseURL: https://starforge.telemetryos.com/
languageCode: en-us
title: StarForge

enableGitInfo: true

module:
  imports:
    - path: github.com/imfing/hextra

menu:
  main:
    - name: Documentation
      pageRef: /docs
      weight: 1
    - name: Guide
      pageRef: /docs/guide
      weight: 2
    - name: Actions
      pageRef: /docs/actions
      weight: 3
    - name: Commands
      pageRef: /docs/commands
      weight: 4
    - name: Search
      weight: 5
      params:
        type: search
    - name: GitHub
      url: "https://github.com/telemetrytv/StarForge"
      weight: 6
      params:
        icon: github

params:
  theme:
    default: system
    displayToggle: true

  navbar:
    displayTitle: true
    displayLogo: true
    width: wide

  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
      tokenize: forward

  editURL:
    enable: true
    base: "https://github.com/telemetrytv/StarForge/edit/master/docs/content"

  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
