# Memory: default cache pressure — don't over-favor dentries over page cache
vm.vfs_cache_pressure=100

# Memory: reserve 128MB so background reclaim starts early, avoiding direct reclaim stalls
vm.min_free_kbytes=131072

# I/O: flush dirty pages sooner to avoid write stalls during playback
vm.dirty_ratio=5
vm.dirty_background_ratio=2

# Network: BBR congestion control for better WiFi throughput
net.core.default_qdisc=fq
net.ipv4.tcp_congestion_control=bbr
