# TelemetryOS Edge — Hyprland kiosk configuration

# Env vars for Wayland session
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

# Propagate env to systemd user session, then start session target
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE
exec-once = systemctl --user start hyprland-session.target

# Wallpaper
exec-once = hyprpaper

# No gaps, no borders
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
}

# No visual effects (performance on Intel N150)
decoration {
    rounding = 0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

# No X11
xwayland {
    enabled = false
}

# Input
input {
    follow_mouse = 0
}

# Hide cursor after 2s, hide on keypress
cursor {
    inactive_timeout = 2
    no_warps = true
    hide_on_key_press = true
}

# Clean kiosk — no logo, no splash, prevent DPMS blanking
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# Auto-fullscreen all windows (kiosk mode)
windowrule = match:class .*, fullscreen on

# Disable update news popup
ecosystem {
    no_update_news = true
}

# No keybindings — pure kiosk
